<!DOCTYPE html>
<html>
<head>
    <style>
        #hiddenDisplay { display: none; }
        #hiddenVisibility { visibility: hidden; }
        #hiddenOpacity { opacity: 0; }
    </style>
</head>
<body>
    <select id="mySelect">
        <option value="1">Visible Option</option>
        <option id="hiddenDisplay" value="2">Hidden Option (display:none)</option>
        <option id="hiddenVisibility" value="3">Hidden Option (visibility:hidden)</option>
        <option id="hiddenOpacity" value="4">Hidden Option (opacity:0)</option>
    </select>
</body>
</html>
