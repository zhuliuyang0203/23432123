[tox]
envlist = docs, flake8, isort, validate-pyproject

[testenv:validate-pyproject]
skip_install = true
deps =
  validate-pyproject==0.23
  packaging==24.2
commands =
  validate-pyproject ./pyproject.toml

[testenv:docs]
skip_install = true
deps =
  -r {toxinidir}/docs/requirements.txt
  -r {toxinidir}/requirements.txt
commands =
  ; regenerate autodoc stub pages
  sphinx-autogen docs/source/api.rst
  ; build api docs
  sphinx-build -b html -d ../build/docs/doctrees docs/source ../build/docs/api/py {posargs}
setenv =
  PYTHONPATH = {toxinidir}/.

[testenv:mypy]
skip_install = true
deps =
  mypy==1.15.0
  lxml==5.3.2
  types-urllib3==1.26.25
  types-certifi==2021.10.8.3
  trio-typing==0.10.0
commands = mypy --install-types {posargs}

[testenv:linting-ci]
; checks linting for CI with stricter exiting when failing.
skip_install = true
deps =
  isort==5.13.2
  black==24.1.1
  flake8==6.1.0
  flake8-typing-imports==1.14.0
  autoflake==2.3.1
  docformatter==1.7.5
commands =
  ; execute isort in check only mode with diff
  isort --check-only --diff selenium/ test/ conftest.py
  ; execute black in check only mode with diff
  black --check --diff selenium/ test/ conftest.py -l 120
  ; execute flake8
  flake8 selenium/ test/ --min-python-version=3.9
  ; execute autoflake in check only mode with diff
  autoflake --check-diff selenium/ test/ conftest.py
  ; execute docformatter in check only mode with diff
  docformatter --check --diff --recursive selenium/

[testenv:linting]
; A consolidated linting based recipe, responsible for executing linting tools across the code base.
; This encompasses:
;   - isort for imports
;   - black and flake8 for general formatting
;   - autoflake for unused imports and variables
;   - docformatter for docstrings
; IMPORTANT:
;   - isort, black, autoflake, and docformatter will rewrite files
;   - flake8 merely alerts to the failure
skip_install = true
deps =
  isort==5.13.2
  black==24.1.1
  flake8==6.1.0
  flake8-typing-imports==1.14.0
  autoflake==2.3.1
  docformatter==1.7.5
commands =
  isort selenium/ test/ conftest.py
  black selenium/ test/ conftest.py -l 120
  flake8 selenium/ test/ --min-python-version=3.9
  autoflake selenium/ test/ conftest.py
  docformatter --in-place --recursive selenium/

[flake8]
exclude = .tox,selenium/webdriver/common/devtools,docs/source/conf.py,*venv
# Disable this once black is applied throughout & line length is better handled.
extend-ignore = E501, E203
# This does nothing for now as E501 is ignored.
max-line-length = 120
